name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Arch Linux (primary target distribution) ──────────────────────────────
  build-arch:
    name: Full build — Arch Linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install git (needed for checkout action inside container)
        run: pacman -Sy --noconfirm git

      - uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --force --recursive

      - name: Install build dependencies
        run: |
          pacman -Su --noconfirm
          pacman -S --noconfirm \
            base-devel \
            cmake \
            ninja \
            extra-cmake-modules \
            libplasma \
            qt6-declarative \
            qt6-websockets \
            qt6-webchannel \
            vulkan-headers \
            mpv \
            lz4

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build -j$(nproc)

  # ── Fedora (secondary target distribution) ───────────────────────────────
  build-fedora:
    name: Full build — Fedora
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install git
        run: dnf install -y git

      - uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --force --recursive

      - name: Enable RPM Fusion (needed for mpv)
        run: |
          dnf install -y \
            "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm" \
            "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm"
          dnf swap -y ffmpeg-free ffmpeg --allowerasing
          dnf install -y ffmpeg-devel --allowerasing

      - name: Install build dependencies
        run: |
          dnf install -y \
            cmake \
            ninja-build \
            extra-cmake-modules \
            vulkan-headers \
            plasma-workspace-devel \
            kf6-plasma-devel \
            kf6-kcoreaddons-devel \
            kf6-kpackage-devel \
            lz4-devel \
            mpv-libs-devel \
            qt6-qtbase-private-devel \
            libplasma-devel \
            qt6-qtwebchannel-devel \
            qt6-qtwebsockets-devel \
            qt6-qtdeclarative-devel

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build -j$(nproc)

  # ── Ubuntu (deb packaging target) ───────────────────────────────────────
  build-ubuntu:
    name: Full build — Ubuntu
    runs-on: ubuntu-latest
    container:
      image: ubuntu:25.04

    steps:
      - name: Install git
        run: |
          apt-get update
          apt-get install -y git

      - uses: actions/checkout@v4

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --force --recursive

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get install -y \
            g++ \
            cmake \
            ninja-build \
            extra-cmake-modules \
            pkg-config \
            libvulkan-dev \
            libkf6package-dev \
            libplasma-dev \
            plasma-workspace-dev \
            qt6-base-dev \
            qt6-base-private-dev \
            qt6-declarative-dev \
            qt6-websockets-dev \
            qt6-webchannel-dev \
            libmpv-dev \
            liblz4-dev \
            libfreetype-dev

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja

      - name: Build
        run: cmake --build build -j$(nproc)

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check C++ formatting
        run: |
          find src -name "*.cpp" -o -name "*.hpp" | \
            xargs clang-format --dry-run --Werror

  # ── Unit tests (Qt6 only, no KDE/Plasma/Vulkan deps) ────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev cmake ninja-build

      - name: Configure (standalone test build)
        run: |
          cmake -B build/tests -S tests \
            -DCMAKE_BUILD_TYPE=Debug \
            -G Ninja

      - name: Build
        run: cmake --build build/tests

      - name: Run tests
        run: ctest --test-dir build/tests --output-on-failure -V
